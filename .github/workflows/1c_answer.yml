name: 1C. Answer

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1B. Generate Answer"]
    types:
      - completed

permissions:
  contents: write # Grants permission to modify and push json state changes back to the repository

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Fetch the latest code and state from the repository
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0 

      # 2. Configure Python Environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # 3. Configure Git Identity Early (To avoid rebase identity conflicts)
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. Pull Latest Changes before setting up infrastructure
      - name: Pull Latest Changes
        run: |
          git pull origin ${GITHUB_REF_NAME:-main} --rebase

      # 5. Install required packages from requirements.txt or raw fallbacks
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install playwright playwright-stealth cryptography python-dotenv; fi

      # 6. Set up Playwright Chromium browser and its system binaries
      - name: Install Playwright and System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      # 7. Run the core automation script (Clean Headless Execution)
      - name: Run Quora Answer Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        run: | 
          python answer.py

      # 8. Archive Error Screenshot if script crashes
      - name: View Screenshot Directly Link
        if: failure()
        run: |
          if [ -f error_screenshot.png ]; then
            echo "[OK] Uploading screenshot to free web hosts..."
            
            # Option 1: Using 0x0.st (Super fast & direct)
            URL_0X0=$(curl -s -F "file=@error_screenshot.png" https://0x0.st)
            
            # Option 2: Using transfer.sh (Fallback if 0x0 fails)
            URL_TRANSFER=$(curl -s --upload-file error_screenshot.png https://transfer.sh/error_screenshot.png)
            
            echo "===================================================="
            echo "👉 DIRECT SCREENSHOT LINK (0x0): $URL_0X0"
            echo "👉 ALTERNATE LINK (Transfer.sh): $URL_TRANSFER"
            echo "===================================================="
          else
            echo "[INFO] No error_screenshot.png found."
          fi
        continue-on-error: true

      # 9. Commit and Push Any Changes (Safe State Sync with Stash)
      - name: Commit and Push Any Changes
        if: always()
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME:-main}"
          
          # Check agar dono mein se kisi bhi file mein changes hain ya nahi
          if ( [ -f status.json ] && ! git diff --quiet status.json ) || ( [ -f answered.json ] && ! git diff --quiet answered.json ); then
            echo "[OK] Changes detected. Stashing modified files to pull latest..."
            git stash
            
            # Remote updates ko safely rebase pull karein
            git pull origin "$BRANCH_NAME" --rebase
            
            # Apne changes ko wapas apply karein (Conflict avoid karne ke liye local state prefer karein)
            git stash pop || git checkout --theirs status.json answered.json 2>/dev/null || true
            
            echo "[OK] Staging and committing updated state files..."
            [ -f status.json ] && git add status.json
            [ -f answered.json ] && git add answered.json
            
            git commit -m "chore: update automation history state [skip ci]"
            
            # Push changes, agar kisi concurrent run ki wajah se reject ho toh rebase karke retry karein
            git push origin "$BRANCH_NAME" || (git pull origin "$BRANCH_NAME" --rebase && git push origin "$BRANCH_NAME")
          else
            echo "[INFO] No changes detected in status or answered JSONs. Skipping push."
          fi