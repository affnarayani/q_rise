name: 1C. Answer

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1B. Generate Answer"]
    types:
      - completed

permissions:
  contents: write # Grants permission to modify and push json state changes back to the repository

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Fetch the latest code and state from the repository
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0 

      # 2. Configure Python Environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # 3. Configure Git Identity Early (To avoid rebase identity conflicts)
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. Pull Latest Changes before setting up infrastructure
      - name: Pull Latest Changes
        run: |
          git pull origin ${GITHUB_REF_NAME:-main} --rebase

      - name: Install and Start Cloudflare WARP (Strict Proxy Mode)
        run: |
          # 1. Repository aur GPG Key set karein
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 2. Install
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          # 3. Start Service
          sudo systemctl start warp-svc
          sleep 2
          
          # 4. Register Normal Account
          warp-cli --accept-tos registration new || warp-cli registration new
          
          # 5. Mode ko PROXY par set karein (Port 40000)
          warp-cli --accept-tos mode proxy || warp-cli mode proxy
          
          # 6. CORRECTED DNS FIX: Naye CLI syntax mein custom DNS ke liye fallback set kiya jata hai
          # Agar ye commands fail bhi hon to script rukiye nahi (|| true)
          warp-cli --accept-tos dns configure-dns-over-https enable || true
          
          echo "[OK] WARP configured in Proxy Mode"

      - name: Secure Proxy Connection Loop
        run: |
          echo "Searching for a clean Cloudflare Proxy IP..."
          
          # Max 15 baar try karega clean IP rotate karne ka
          for i in {1..15}; do
            echo "Attempt $i: Connecting to WARP..."
            warp-cli --accept-tos connect || warp-cli connect
            sleep 6
            
            # Port 40000 ke through check karenge ki Quora abhi bhi 403 de raha hai ya nahi
            STATUS_CODE=$(curl -s -x http://127.0.0.1:40000 -o /dev/null -w "%{http_code}" https://www.quora.com/ || true)
            
            if [ "$STATUS_CODE" = "200" ]; then
              echo "[SUCCESS] Found a clean proxy IP! Status code: $STATUS_CODE"
              break
            else
              echo "[BLOCKED] Proxy IP gave Status $STATUS_CODE. Reconnecting for a new routing..."
              warp-cli --accept-tos disconnect || warp-cli disconnect
              sleep 2
            fi
            
            if [ $i -eq 15 ]; then
              echo "[ERROR] Could not bypass Cloudflare 403 after 15 attempts."
              exit 1
            fi
          done

      # 5. Install required packages from requirements.txt or raw fallbacks
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install playwright playwright-stealth cryptography python-dotenv; fi

      # 6. Set up Playwright Chromium browser and its system binaries
      - name: Install Playwright and System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      # 7. Run the core automation script (Clean Headless Execution)
      - name: Run Quora Answer Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
          HTTP_PROXY: http://127.0.0.1:40000
          HTTPS_PROXY: http://127.0.0.1:40000
        run: | 
          python answer.py

      # 8. Archive Error Screenshot if script crashes
      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quora-final-error-screenshot
          path: error_screenshot.png
          if-no-files-found: ignore
          retention-days: 3

      # 9. Commit and Push Any Changes (Safe State Sync with Stash)
      - name: Commit and Push Any Changes
        if: always()
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME:-main}"
          
          # Check agar dono mein se kisi bhi file mein changes hain ya nahi
          if ( [ -f status.json ] && ! git diff --quiet status.json ) || ( [ -f answered.json ] && ! git diff --quiet answered.json ); then
            echo "[OK] Changes detected. Stashing modified files to pull latest..."
            git stash
            
            # Remote updates ko safely rebase pull karein
            git pull origin "$BRANCH_NAME" --rebase
            
            # Apne changes ko wapas apply karein (Conflict avoid karne ke liye local state prefer karein)
            git stash pop || git checkout --theirs status.json answered.json 2>/dev/null || true
            
            echo "[OK] Staging and committing updated state files..."
            [ -f status.json ] && git add status.json
            [ -f answered.json ] && git add answered.json
            
            git commit -m "chore: update automation history state [skip ci]"
            
            # Push changes, agar kisi concurrent run ki wajah se reject ho toh rebase karke retry karein
            git push origin "$BRANCH_NAME" || (git pull origin "$BRANCH_NAME" --rebase && git push origin "$BRANCH_NAME")
          else
            echo "[INFO] No changes detected in status or answered JSONs. Skipping push."
          fi