name: 1B. Generate Answer

on: 
  workflow_dispatch: 
  workflow_run:
    workflows: ["1A. Search Post to Answer"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    # FIXED: Ab yeh tabhi chalega jab ya toh manual run ho, YA pehla workflow STRICTLY 'success' ke saath complete hua ho
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Start Cloudflare WARP (TUN Global Mode)
      run: |
        # 1. Repository aur GPG Key set karein
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        
        # 2. Install
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        # 3. Start Service
        sudo systemctl start warp-svc
        sleep 2
        
        # 4. Register (New CLI Syntax compatible)
        warp-cli --accept-tos registration new || warp-cli registration new
        
        # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
        # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
        warp-cli --accept-tos mode warp || warp-cli mode warp
        
        # 6. Connect
        warp-cli --accept-tos connect || warp-cli connect
        sleep 5
        
        # 7. Verify ki pure system ka IP change hua ya nahi
        curl https://cloudflare.com/cdn-cgi/trace

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv requests
        playwright install chromium --with-deps

    - name: Run Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        IMGBBB_API_KEY: ${{ secrets.IMGBBB_API_KEY }}
      run: |
        python generate_answer_by_chatgpt.py

    # =======================================================
    # EXCELLENT: Screenshot artifact upload is active
    # =======================================================
    - name: Upload Error Screenshot
      if: failure() 
      uses: actions/upload-artifact@v4
      with:
        name: playwright-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore
        retention-days: 3

    - name: Commit and Push Changes (If updated)
      if: always() 
      run: |
        # Check if status.json OR quora_cta_state.json was modified/created
        if [ -n "$(git status --porcelain status.json quora_cta_state.json 2>/dev/null)" ]; then
          echo "[OK] Changes detected. Stashing changes to pull latest..."
          git stash --include-untracked
          
          # Force pull remote changes safely
          git pull origin ${GITHUB_REF_NAME} --rebase
          
          # Pop back our modified files
          git stash pop
          
          echo "[OK] Staging and committing status.json and quora_cta_state.json..."
          git add status.json
          [ -f quora_cta_state.json ] && git add quora_cta_state.json
          git commit -m "Automated: Update answer generation status and CTA state [skip ci]"
          
          # Push changes, if conflicts occur due to concurrent runs, retry once
          git push origin ${GITHUB_REF_NAME} || (git pull origin ${GITHUB_REF_NAME} --rebase && git push origin ${GITHUB_REF_NAME})
        else
          echo "[INFO] No changes detected in status.json or quora_cta_state.json. Skipping push."
        fi