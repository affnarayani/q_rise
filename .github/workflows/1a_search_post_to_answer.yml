name: 1A. Search Post to Answer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search-automation:
    runs-on: ubuntu-latest
    
    # CRITICAL: Permission granted for committing/pushing changes back to repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Full history fetch karega safe dynamic push ke liye

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Start Cloudflare WARP Official Client
      run: |
        # 1. Cloudflare ka official gpg key aur repository add karein
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        
        # 2. WARP client install karein
        sudo apt-get update
        sudo apt-get install -y cloudflare-warp
        
        # 3. WARP service ko background mein start karein
        sudo systemctl start warp-svc
        sleep 3
        
        # 4. Environment Variable ke sath Terms of Service accept aur register karein
        export WARP_ACCEPT_TOS=1
        
        # Naye CLI mein global flag commands se PEHLE lagaya jata hai, is tarah:
        warp-cli --accept-tos registration new || warp-cli registration new
        
        # 5. Client ko proxy mode par set karke connect karein
        warp-cli --accept-tos mode proxy || warp-cli mode proxy
        warp-cli --accept-tos connect || warp-cli connect
        
        # 6. Proxy status verification
        sleep 5
        warp-cli --accept-tos status || warp-cli status
        echo "[OK] Cloudflare WARP is running on local proxy port 40000"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv
        playwright install chromium --with-deps

    - name: Run Search Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        HTTP_PROXY: http://127.0.0.1:40000
        HTTPS_PROXY: http://127.0.0.1:40000
      run: |
        python search_post_to_answer.py

    - name: Upload Error Screenshot
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: quora-final-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore
        retention-days: 3

    - name: Commit and Push Status Changes
      if: always()
      run: |
        # Check agar dono mein se kisi bhi file mein changes hain ya nahi
        if ( [ -f status.json ] && ! git diff --quiet status.json ) || ( [ -f answered.json ] && ! git diff --quiet answered.json ); then
          echo "[OK] Changes detected. Stashing modified files to pull latest..."
          git stash
          
          # Remote updates ko safely rebase pull karein jisse execution block na ho
          git pull origin ${GITHUB_REF_NAME} --rebase
          
          # Apne changes ko wapas apply karein
          git stash pop
          
          echo "[OK] Staging and committing updated state files..."
          [ -f status.json ] && git add status.json
          [ -f answered.json ] && git add answered.json
          
          git commit -m "Automated: Fresh target state updated [skip ci]"
          
          # Push changes, agar concurrent run ki wajah se reject ho toh ek baar retry karein
          git push origin ${GITHUB_REF_NAME} || (git pull origin ${GITHUB_REF_NAME} --rebase && git push origin ${GITHUB_REF_NAME})
        else
          echo "[INFO] No changes detected in status or answered JSONs. Skipping push."
        fi