name: 1A. Search Post to Answer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search-automation:
    runs-on: ubuntu-latest
    
    # CRITICAL: Permission granted for committing/pushing changes back to repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Full history fetch karega safe dynamic push ke liye

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Start Cloudflare WARP (TUN Global Mode)
      run: |
        # 1. Repository aur GPG Key set karein
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        
        # 2. Install
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        # 3. Start Service
        sudo systemctl start warp-svc
        sleep 2
        
        # 4. Register (New CLI Syntax compatible)
        warp-cli --accept-tos registration new || warp-cli registration new
        
        # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
        # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
        warp-cli --accept-tos mode warp || warp-cli mode warp
        
        # 6. Connect
        warp-cli --accept-tos connect || warp-cli connect
        sleep 5
        
        # 7. Verify ki pure system ka IP change hua ya nahi
        curl https://cloudflare.com/cdn-cgi/trace

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv seleniumbase turnstile_solver
        playwright install chromium --with-deps

    - name: Run Search Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        IMGBBB_API_KEY: ${{ secrets.IMGBBB_API_KEY }}
      run: |
        curl -I https://cloudflare.com/cdn-cgi/trace || echo "Proxy not responding"
        sudo apt-get update
        sudo apt-get install -y xvfb x11-xserver-utils
        xvfb-run python search_post_to_answer.py

    - name: Upload Error Screenshot
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: quora-final-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore
        retention-days: 3

    - name: Commit and Push Status Changes
      if: always()
      run: |
        # Check agar dono mein se kisi bhi file mein changes hain ya nahi
        if ( [ -f status.json ] && ! git diff --quiet status.json ) || ( [ -f answered.json ] && ! git diff --quiet answered.json ); then
          echo "[OK] Changes detected. Stashing modified files to pull latest..."
          git stash
          
          # Remote updates ko safely rebase pull karein jisse execution block na ho
          git pull origin ${GITHUB_REF_NAME} --rebase
          
          # Apne changes ko wapas apply karein
          git stash pop
          
          echo "[OK] Staging and committing updated state files..."
          [ -f status.json ] && git add status.json
          [ -f answered.json ] && git add answered.json
          
          git commit -m "Automated: Fresh target state updated [skip ci]"
          
          # Push changes, agar concurrent run ki wajah se reject ho toh ek baar retry karein
          git push origin ${GITHUB_REF_NAME} || (git pull origin ${GITHUB_REF_NAME} --rebase && git push origin ${GITHUB_REF_NAME})
        else
          echo "[INFO] No changes detected in status or answered JSONs. Skipping push."
        fi